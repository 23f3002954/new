name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '12 06 * * *'   # specific hour & minute
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "23f3002954@ds.study.iitm.ac.in"

      - name: Modify file
        run: |
          echo "Run at $(date -u)" >> daily-log.txt

      - name: Commit step - 23f3002954@ds.study.iitm.ac.in
        run: |
          git add daily-log.txt
          git commit -m "Daily commit $(date -u)"

      - name: Push changes
        run: git push

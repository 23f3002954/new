name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '37 05 * * *'   # Runs daily at 05:37 UTC (specific time)
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "23f3002954@ds.study.iitm.ac.in"

      - name: Update file
        run: |
          echo "Workflow ran at $(date -u)" >> daily-log.txt

      - name: Commit changes - 23f3002954@ds.study.iitm.ac.in
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit $(date -u)" || echo "Nothing to commit"

      - name: Push changes
        run: git push origin HEAD

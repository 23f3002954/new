name: Daily Auto Commit

permissions:
  contents: write

on:
  schedule:
    - cron: '23 04 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "23f3002954@ds.study.iitm.ac.in"

      - name: Create file update
        run: |
          echo "Workflow ran at $(date -u)" >> daily-log.txt

      - name: Commit step - 23f3002954@ds.study.iitm.ac.in
        run: |
          git add daily-log.txt
          git commit -m "Daily automated commit $(date -u)" || echo "No changes"

      - name: Push changes
        run: git push
